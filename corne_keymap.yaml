    - Z
    - X
    - C
    - V
    - B
  - - N
    - M
    - ','
    - .
    - /
    - {t: FUNC, h: sticky}
    - {t: LCTRL, h: sticky}
    - {t: ENTER, h: LEFT GUI}
    - {t: TAB, h: LOWER}
    - {t: SPACE, h: UPPER}
  - - BACKSPACE
    - {t: RIGHT SHIFT, h: sticky}
  LOWER:
  - - {t: ▽, type: trans}
    - '!'
    - '@'
    - '#'
    - $
    - '%'
    - ^
    - '&'
    - '*'
    - (
