    - '9'
    - '0'
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - '~'
    - '`'
    - '['
    - '{'
  - - '}'
    - ']'
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - LEFT WIN
    - {t: ▽, type: trans}
    - '&mkp LCLK'
    - '&mkp RCLK'
    - {type: held}
    - SPACE
  - - {t: ▽, type: trans}
    - ':'
  UPPER:
  - - {t: ▽, type: trans}
    - DELETE
    - {t: ▽, type: trans}
    - _
    - +
    - PAGE UP
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - PLAY PAUSE
    - PREVIOUS
