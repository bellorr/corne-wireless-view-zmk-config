    - RIGHT
    - MENU
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - <
    - '>'
    - Gui+C
    - Gui+V
    - ;
  - - \
    - '|'
    - {t: ▽, type: trans}
    - VOLUME DOWN
    - VOLUME UP
    - {t: ▽, type: trans}
    - ESCAPE
    - {t: ▽, type: trans}
    - TAB
    - {type: held}
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  FUNC:
  - - {t: ▽, type: trans}
