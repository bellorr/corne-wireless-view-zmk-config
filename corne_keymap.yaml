  - - {t: BT, h: '2'}
    - {t: ▽, type: trans}
    - BT CLR
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - CAPS
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
