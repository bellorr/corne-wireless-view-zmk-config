name: Update Nice!View Images
on:
  push:
    paths:
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install Pillow
      - name: Convert images
        run: |
          mkdir -p converted_peripheral converted_central
          python3 scripts/niceview_lvgl_convert.py assets/fsociety.png \
            --outdir converted_peripheral --width 68 --height 124 --no-dither
          python3 scripts/niceview_lvgl_convert.py assets/htp_skull.png \
            --outdir converted_central --width 68 --height 85 --no-dither
      - name: Write art.c files
        run: |
          python3 scripts/write_art_c.py \
            --converted converted_peripheral \
            --output config/boards/shields/nice_view_gem/assets/art.c \
            --prefix anim_imgs
          python3 scripts/write_art_c.py \
            --converted converted_central \
            --output config/boards/shields/nice_view_gem/assets/art_central.c \
            --prefix central_imgs
      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add config/boards/shields/nice_view_gem/assets/art.c
          git add config/boards/shields/nice_view_gem/assets/art_central.c
          git diff --staged --quiet || git commit -m "chore: regenerate nice!view art from assets"
          git push
